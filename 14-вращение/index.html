<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Билетик20</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main>
       <div class="card">
            <div class="front">
                <div class="card_img">
                <img src="img/back_baum.png" alt="noimg">
            </div>
            <div class="card_text">
                <div class="card_up">
                    <p class="card_title">Название продукта</p>
                    <p class="card_setters">
                        <div class="card_count">
                            <button class="minus">-</button>
                            <span>1</span>
                             <button class="plus">+</button>
                        </div>
                        <p class="card_price">100r</p>
                    </p>
                </div>
                <p class="card_desc">Краткое описание продукта или товара</p>
                <button class="card_btn">Добавить в корзину</button>
            </div>
            </div>
            <div class="back"></div>
        </div>
    </main>
    <script src="js/script.js"></script>
</body>
</html>
